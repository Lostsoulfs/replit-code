version: 2
# Monthly cadence: this is a low-churn demo repo — grouped monthly PRs keep
# dependencies current without weekly review noise (npm audit is checked too).
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns: ["*"]
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      npm:
        patterns: ["*"]
    open-pull-requests-limit: 5
