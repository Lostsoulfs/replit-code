version: 2
# Monthly cadence: this is a low-churn demo repo — grouped monthly PRs keep
# dependencies current without weekly review noise (npm audit is checked too).
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    # Cooldown: hold version-update PRs so a freshly published (possibly
    # compromised) release ages in public before it reaches CI. Security
    # updates for known CVEs bypass this automatically.
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns: ["*"]
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 7
    groups:
      npm:
        patterns: ["*"]
    open-pull-requests-limit: 5
