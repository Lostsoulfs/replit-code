name: Drift Audit

# Audits every PR for "drift" — divergence between what was logged (commits,
# PR body, docs/LEARNINGS.md) and what the diff actually did — using a
# deterministic Node script. NO API key required: it posts via the built-in
# GITHUB_TOKEN and applies only safe formatting/lint auto-fixes.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write # push safe auto-fixes back to the PR branch
  pull-requests: write # post the audit report comment

jobs:
  audit:
    runs-on: ubuntu-latest
    # GITHUB_TOKEN is read-only for fork PRs, so skip them (can't comment/push).
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Run drift audit (with safe auto-fix)
        env:
          GITHUB_PR_BODY: ${{ github.event.pull_request.body }}
        run: node scripts/audit-drift.mjs --base "origin/${{ github.base_ref }}" --head HEAD --fix --run-checks

      - name: Commit & push auto-fixes (if any)
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "audit: auto-fix (prettier + eslint --fix)"
            git push
          fi

      - name: Post audit report comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr comment "${{ github.event.pull_request.number }}" --body-file audit-report.md
