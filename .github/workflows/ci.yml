name: CI

# Gate: lint + unit tests + build on every push and PR, plus the
# rendered-app Playwright smoke (verify.mjs) as a separate job.

on:
  push:
    branches: [main, 'claude/**']
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false # read-only job; don't leave the token on disk
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  # Rendered-app smoke (verify.mjs): boot, spin, win credit, 0 console
  # errors. Runs HERE because the dev container's network policy blocks
  # the Playwright browser download — CI is where this can execute.
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false # read-only job; don't leave the token on disk
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps # chromium only — smoke needs one browser
      - run: npm run build
      - name: Serve the build and run the smoke test
        run: |
          npx vite preview --port 4173 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:4173/ >/dev/null && break
            sleep 1
          done
          node verify.mjs
      - name: Upload smoke screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: smoke-screenshots
          path: shot-*.png
          if-no-files-found: ignore
