name: Deploy to GitHub Pages

# Builds the Vite bundle and (a) always uploads it as a downloadable artifact,
# and (b) publishes it to GitHub Pages IF Pages is enabled.
# One-time setup for the live URL: repo Settings -> Pages -> Source: "GitHub Actions".
# If Pages isn't enabled (or not on the repo's plan), the run still succeeds and
# you can grab the build from the run's "Artifacts" section.

on:
  push:
    branches: [main, claude/fast-visual-demo-GV6wC]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages_ready: ${{ steps.pages.outcome }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      # Always available: download the playable build from the run page.
      - name: Upload build artifact (downloadable)
        uses: actions/upload-artifact@v4
        with:
          name: slot-build
          path: dist

      # Pages path — tolerated if Pages isn't enabled yet.
      - name: Configure Pages
        id: pages
        continue-on-error: true
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        if: steps.pages.outcome == 'success'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: needs.build.outputs.pages_ready == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
