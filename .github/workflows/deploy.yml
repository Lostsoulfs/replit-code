name: Deploy to GitHub Pages

# Builds the Vite bundle and (a) always uploads it as a downloadable artifact,
# and (b) publishes it to GitHub Pages IF Pages is enabled.
# One-time setup for the live URL: repo Settings -> Pages -> Source: "GitHub Actions".
# If Pages isn't enabled (or not on the repo's plan), the run still succeeds and
# you can grab the build from the run's "Artifacts" section.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege: read-only by default; the deploy job below requests the
# Pages/OIDC write scopes it needs (zizmor: excessive-permissions).
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: read # configure-pages probes whether Pages is enabled
    outputs:
      pages_ready: ${{ steps.pages.outcome }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false # build-only job; don't leave the token on disk
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      # Always available: download the playable build from the run page.
      - name: Upload build artifact (downloadable)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: slot-build
          path: dist

      # Pages path — tolerated if Pages isn't enabled yet.
      - name: Configure Pages
        id: pages
        continue-on-error: true
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Upload Pages artifact
        if: steps.pages.outcome == 'success'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    needs: build
    if: needs.build.outputs.pages_ready == 'success'
    runs-on: ubuntu-latest
    permissions:
      pages: write # publish the Pages deployment
      id-token: write # OIDC token deploy-pages uses to authenticate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
