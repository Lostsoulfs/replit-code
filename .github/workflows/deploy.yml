name: Deploy to GitHub Pages

# Builds the Vite bundle and (a) always uploads it as a downloadable artifact,
# and (b) publishes it to GitHub Pages IF Pages is enabled.
# One-time setup for the live URL: repo Settings -> Pages -> Source: "GitHub Actions".
# If Pages isn't enabled (or not on the repo's plan), the run still succeeds and
# you can grab the build from the run's "Artifacts" section.

on:
  push:
    branches: [main, claude/fast-visual-demo-GV6wC]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      pages_ready: ${{ steps.pages.outcome }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

      # Always available: download the playable build from the run page.
      - name: Upload build artifact (downloadable)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: slot-build
          path: dist

      # Pages path — tolerated if Pages isn't enabled yet.
      - name: Configure Pages
        id: pages
        continue-on-error: true
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Upload Pages artifact
        if: steps.pages.outcome == 'success'
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist

  deploy:
    needs: build
    if: needs.build.outputs.pages_ready == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
